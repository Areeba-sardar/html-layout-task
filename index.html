<!DOCTYPE html>
<html>
<head>
    <title>Layout Task</title>

    <style>
        body {
            margin: 0;
            font-family: Arial;
            text-align: center;
        }

        header, nav, footer {
            background-color: lightgray;
            padding: 20px;
            margin: 10px;
        }

        main {
            display: flex;
            margin: 10px;
        }

        aside {
            background-color: lightgray;
            width: 20%;
            padding: 50px 10px;
            margin: 5px;
        }

        section {
            background-color: lightgray;
            width: 60%;
            padding: 50px 10px;
            margin: 5px;
        }

        footer {
            padding: 20px;
        }
    </style>

</head>

<body>

    <header>
        <h2>Header</h2>
    </header>

    <nav>
        <h3>Navigation Menu</h3>
    </nav>

    <main>
        <aside>
            <p>Content</p>
        </aside>

        <section>
            <p>Main Content</p>
        </section>

        <aside>
            <p>Content</p>
        </aside>
    </main>

    <footer>
        <h3>Footer</h3>
    </footer>

</body>
</html>
